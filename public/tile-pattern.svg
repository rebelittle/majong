<svg xmlns="http://www.w3.org/2000/svg" width="220" height="220" viewBox="0 0 220 220">
  <defs>
    <!-- Base tile look: warm bone face, thin dark edge, subtle inner highlight -->
    <linearGradient id="tileFace" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FBF3DA"/>
      <stop offset="100%" stop-color="#EFE3C0"/>
    </linearGradient>

    <symbol id="tileBlank" viewBox="0 0 40 56">
      <rect x="1" y="1" width="38" height="54" rx="5" ry="5"
            fill="url(#tileFace)" stroke="#A6916A" stroke-width="0.8"/>
      <rect x="3" y="3" width="34" height="50" rx="3.5" ry="3.5"
            fill="none" stroke="#D9C696" stroke-width="0.5"/>
    </symbol>

    <!-- Bamboo (bam) – three vertical bamboo segments -->
    <symbol id="tileBam" viewBox="0 0 40 56">
      <use href="#tileBlank"/>
      <g stroke="#0F8A5F" stroke-width="2.4" stroke-linecap="round">
        <line x1="14" y1="14" x2="14" y2="42"/>
        <line x1="20" y1="14" x2="20" y2="42"/>
        <line x1="26" y1="14" x2="26" y2="42"/>
      </g>
      <g fill="#0F8A5F">
        <circle cx="14" cy="14" r="1.6"/>
        <circle cx="20" cy="14" r="1.6"/>
        <circle cx="26" cy="14" r="1.6"/>
        <circle cx="14" cy="42" r="1.6"/>
        <circle cx="20" cy="42" r="1.6"/>
        <circle cx="26" cy="42" r="1.6"/>
      </g>
    </symbol>

    <!-- Dot (circle) – three small circles -->
    <symbol id="tileDot" viewBox="0 0 40 56">
      <use href="#tileBlank"/>
      <g fill="none" stroke="#1F5BA8" stroke-width="1.5">
        <circle cx="20" cy="16" r="5"/>
        <circle cx="20" cy="28" r="5"/>
        <circle cx="20" cy="40" r="5"/>
      </g>
      <g fill="#B8302A">
        <circle cx="20" cy="16" r="1.5"/>
        <circle cx="20" cy="28" r="1.5"/>
        <circle cx="20" cy="40" r="1.5"/>
      </g>
    </symbol>

    <!-- Character (wan) – the 萬 character stylized -->
    <symbol id="tileWan" viewBox="0 0 40 56">
      <use href="#tileBlank"/>
      <text x="20" y="22" text-anchor="middle"
            font-family="serif" font-size="13" font-weight="700" fill="#B8302A">五</text>
      <text x="20" y="42" text-anchor="middle"
            font-family="serif" font-size="14" font-weight="700" fill="#13294A">萬</text>
    </symbol>

    <!-- East wind (東) – red dragon style -->
    <symbol id="tileWind" viewBox="0 0 40 56">
      <use href="#tileBlank"/>
      <text x="20" y="35" text-anchor="middle"
            font-family="serif" font-size="20" font-weight="700" fill="#0F8A5F">東</text>
    </symbol>
  </defs>

  <!-- The pattern itself: 4 tiles at gentle rotations, opacity tuned so text on top remains readable -->
  <g opacity="0.16">
    <g transform="translate(20 28) rotate(-12)">
      <use href="#tileBam" width="40" height="56"/>
    </g>
    <g transform="translate(140 18) rotate(8)">
      <use href="#tileDot" width="40" height="56"/>
    </g>
    <g transform="translate(30 130) rotate(15)">
      <use href="#tileWan" width="40" height="56"/>
    </g>
    <g transform="translate(135 140) rotate(-10)">
      <use href="#tileWind" width="40" height="56"/>
    </g>
  </g>
</svg>
